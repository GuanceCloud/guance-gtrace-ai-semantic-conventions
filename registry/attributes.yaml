version: 0.1.0
status: draft
attributes:
  - name: gen_ai.operation.name
    namespace: otel
    type: string
    requirement: required
    applies_to: [span, metric]
    allowed_values: [chat, create_agent, create_memory, create_memory_store, delete_memory, delete_memory_store, embeddings, execute_tool, generate_content, invoke_agent, invoke_workflow, plan, retrieval, search_memory, text_completion, update_memory, upsert_memory]
    description: The GenAI operation name. Use official well-known values when applicable.
  - name: gen_ai.provider.name
    namespace: otel
    type: string
    requirement: conditionally_required
    applies_to: [span, metric]
    description: The GenAI provider identified by instrumentation.
  - name: gen_ai.conversation.id
    namespace: otel
    type: string
    requirement: conditionally_required
    applies_to: [span, metric]
    description: Real conversation, session, or thread id when available.
  - name: gen_ai.agent.name
    namespace: otel
    type: string
    requirement: recommended
    applies_to: [span, resource]
    description: Human-readable GenAI agent name.
  - name: gen_ai.agent.version
    namespace: otel
    type: string
    requirement: recommended
    applies_to: [span, resource]
    description: Agent or runtime version.
  - name: gen_ai.request.model
    namespace: otel
    type: string
    requirement: conditionally_required
    applies_to: [span, metric]
    description: Requested model name.
  - name: gen_ai.response.model
    namespace: otel
    type: string
    requirement: recommended
    applies_to: [span, metric]
    description: Model that generated the response.
  - name: gen_ai.usage.input_tokens
    namespace: otel
    type: int
    requirement: recommended
    applies_to: [span]
    description: Full input tokens, including provider-managed cache tokens.
  - name: gen_ai.usage.output_tokens
    namespace: otel
    type: int
    requirement: recommended
    applies_to: [span]
    description: Full output tokens, including reasoning output tokens.
  - name: gen_ai.usage.cache_read.input_tokens
    namespace: otel
    type: int
    requirement: recommended
    applies_to: [span]
    description: Input tokens served from provider-managed cache.
  - name: gen_ai.usage.cache_creation.input_tokens
    namespace: otel
    type: int
    requirement: recommended
    applies_to: [span]
    description: Input tokens written to provider-managed cache.
  - name: gen_ai.usage.reasoning.output_tokens
    namespace: otel
    type: int
    requirement: recommended
    applies_to: [span]
    description: Output tokens used for reasoning.
  - name: gen_ai.token.type
    namespace: otel
    type: string
    requirement: required
    applies_to: [metric]
    allowed_values: [input, output]
    description: Token type for standard token usage metrics.
  - name: gen_ai.tool.name
    namespace: otel
    type: string
    requirement: required
    applies_to: [span, metric]
    description: Tool name.
  - name: gen_ai.tool.call.id
    namespace: otel
    type: string
    requirement: recommended
    applies_to: [span]
    description: Tool call identifier.
  - name: gen_ai.tool.call.arguments
    namespace: otel
    type: any
    requirement: opt_in
    applies_to: [span]
    description: Tool call arguments. Must be redacted and truncated by default.
  - name: gen_ai.tool.call.result
    namespace: otel
    type: any
    requirement: opt_in
    applies_to: [span]
    description: Tool call result. Must be redacted and truncated by default.
  - name: gen_ai.tool.description
    namespace: otel
    type: string
    requirement: recommended
    applies_to: [span]
    description: Tool description.
  - name: gen_ai.tool.type
    namespace: otel
    type: string
    requirement: recommended
    applies_to: [span, metric]
    allowed_values: [function, extension, datastore]
    description: Type of the tool utilized by the agent.
  - name: error.type
    namespace: otel
    type: string
    requirement: conditionally_required
    applies_to: [span, metric]
    description: Low-cardinality error type.
  - name: skill.name
    namespace: gtrace
    type: string
    requirement: required
    applies_to: [span, metric]
    description: Skill name.
  - name: skill.call.id
    namespace: gtrace
    type: string
    requirement: recommended
    applies_to: [span]
    description: Skill call identifier.
  - name: skill.description
    namespace: gtrace
    type: string
    requirement: recommended
    applies_to: [span]
    metric_tag: false
    description: Skill description.
  - name: skill.path
    namespace: gtrace
    type: string
    requirement: recommended
    applies_to: [span]
    metric_tag: false
    description: Path to skill entry file.
  - name: skill.source.type
    namespace: gtrace
    type: string
    requirement: recommended
    applies_to: [span, metric]
    allowed_values: [system, user, workspace]
    description: Skill source type.
  - name: skill.result.status
    namespace: gtrace
    type: string
    requirement: recommended
    applies_to: [span]
    allowed_values: [completed, error, cancelled]
    description: Skill result status.
  - name: agent_runtime
    namespace: gtrace
    type: string
    requirement: recommended
    applies_to: [resource, span, metric]
    allowed_values: [codex, claude, hermes, openclaw]
    description: Agent runtime identifier.
deprecated:
  - name: gen_ai.skill1.*
    replacement: skill.*
  - name: gen_ai.operation.name=skill
    replacement: gen_ai.operation.name=execute_tool plus skill.*
  - name: gen_ai.usage.total_tokens
    replacement: derive from gen_ai.usage.input_tokens and gen_ai.usage.output_tokens
